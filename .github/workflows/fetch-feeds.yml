name: Fetch feeds

# Pull RSS feeds that block Cloudflare Workers' IP range (e.g. Seattle Times
# behind CloudFront). GitHub Actions runners use Azure IPs that publishers
# don't typically block, so we fetch here and commit the XML back into the
# repo. The news-stand worker then polls the raw.githubusercontent.com URL
# instead of the original source.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-feeds
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch feeds
        run: |
          mkdir -p feeds

          UA='Mozilla/5.0 (Macintosh; Intel Mac OS X 14_6) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Safari/537.36'

          # SLUG|URL pairs. Try multiple section feeds for ST in case the
          # homepage /feed/ gets aggressively challenged but section feeds
          # slip through with less protection.
          FEEDS=(
            "seattle-times|https://www.seattletimes.com/feed/"
            "seattle-times-news|https://www.seattletimes.com/seattle-news/feed/"
            "seattle-times-food|https://www.seattletimes.com/life/food-drink/feed/"
            "seattle-times-business|https://www.seattletimes.com/business/feed/"
          )

          # Per-URL fetch with two attempts: first cold, second with cookies
          # carried over from the first response (some CDNs require a
          # JS-challenge-then-retry handshake; cookies sometimes shortcut it).
          for entry in "${FEEDS[@]}"; do
            slug="${entry%%|*}"
            url="${entry#*|}"
            jar="/tmp/${slug}-cookies.txt"
            tmp="$(mktemp)"
            echo "─────────────────────────────────────"
            echo "→ $slug"
            echo "  $url"

            # Attempt 1 — cold
            status=$(curl -sSL --max-time 30 \
              -A "$UA" \
              -H "Accept: application/rss+xml, application/xml;q=0.9, */*;q=0.5" \
              -H "Accept-Language: en-US,en;q=0.9" \
              -H "Cache-Control: no-cache" \
              -H "Referer: https://www.google.com/" \
              -c "$jar" \
              -o "$tmp" \
              -w "%{http_code}" \
              "$url" || echo "curl_error")
            size=$(wc -c < "$tmp" 2>/dev/null | tr -d ' ' || echo "0")
            size="${size:-0}"
            echo "  attempt 1: HTTP $status, $size bytes"

            # If empty/non-200, sleep 8s and retry with cookies set
            if [ "$status" != "200" ] || [ "$size" -lt 200 ]; then
              echo "  ↳ sleeping 8s and retrying with cookies"
              sleep 8
              status=$(curl -sSL --max-time 30 \
                -A "$UA" \
                -H "Accept: application/rss+xml, application/xml;q=0.9, */*;q=0.5" \
                -H "Accept-Language: en-US,en;q=0.9" \
                -H "Referer: https://www.google.com/" \
                -b "$jar" \
                -o "$tmp" \
                -w "%{http_code}" \
                "$url" || echo "curl_error")
              size=$(wc -c < "$tmp" 2>/dev/null | tr -d ' ' || echo "0")
              size="${size:-0}"
              echo "  attempt 2: HTTP $status, $size bytes"
            fi

            if [ "$status" = "200" ] && [ "$size" -gt 200 ] 2>/dev/null; then
              mv "$tmp" "feeds/$slug.xml"
              if head -c 200 "feeds/$slug.xml" | grep -q '<'; then
                echo "  ✓ XML-looking content saved → feeds/$slug.xml"
              else
                echo "  ⚠️ saved, but doesn't look like XML in first 200 bytes"
              fi
            else
              echo "  ✗ both attempts rejected; first 400 chars of response:"
              head -c 400 "$tmp" 2>/dev/null | sed 's/^/    /' || true
              echo ""
              rm -f "$tmp"
            fi

            rm -f "$jar"
          done

      - name: Commit & push if changed
        run: |
          git config user.name "feed-bot"
          git config user.email "noreply@ppmma.org"
          git add feeds/
          if git diff --staged --quiet; then
            echo "No feed changes; nothing to commit."
            exit 0
          fi
          git commit -m "feeds: refresh $(date -u +%Y-%m-%dT%H:%MZ)"

          for attempt in 1 2 3; do
            if git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt rejected; pulling --rebase and retrying"
            git pull --rebase
          done
          echo "push failed after 3 attempts"
          exit 1
