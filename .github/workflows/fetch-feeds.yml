name: Fetch feeds

# Pull RSS feeds that block Cloudflare Workers' IP range (e.g. Seattle Times
# behind CloudFront). GitHub Actions runners use Azure IPs that publishers
# don't typically block, so we fetch here and commit the XML back into the
# repo. The news-stand worker then polls the raw.githubusercontent.com URL
# instead of the original source.

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: {} # manual run from the Actions tab

permissions:
  contents: write

# Only one fetch run at a time. If a manual run is triggered while the cron
# run is still in flight, queue (don't cancel) so we never have two pushes
# racing each other.
concurrency:
  group: fetch-feeds
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch feeds
        run: |
          mkdir -p feeds

          # A modern Chrome UA — some publishers serve an empty body to non-
          # browser user-agents, so we pretend to be a real browser. Accept
          # headers nudge them toward RSS/XML over an HTML interstitial.
          UA='Mozilla/5.0 (Macintosh; Intel Mac OS X 14_6) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Safari/537.36'

          # Add more feeds by appending lines: SLUG|URL
          FEEDS=(
            "seattle-times|https://www.seattletimes.com/feed/"
          )

          for entry in "${FEEDS[@]}"; do
            slug="${entry%%|*}"
            url="${entry#*|}"
            tmp="$(mktemp)"
            echo "─────────────────────────────────────"
            echo "→ $slug"
            echo "  $url"
            status=$(curl -sSL --max-time 30 \
              -A "$UA" \
              -H "Accept: application/rss+xml, application/xml;q=0.9, */*;q=0.5" \
              -H "Accept-Language: en-US,en;q=0.9" \
              -H "Cache-Control: no-cache" \
              -o "$tmp" \
              -w "%{http_code}" \
              "$url" || echo "curl_error")
            size=$(wc -c < "$tmp" 2>/dev/null | tr -d ' ' || echo "0")
            size="${size:-0}"
            echo "  HTTP $status, $size bytes"

            if [ "$status" = "200" ] && [ "$size" -gt 200 ] 2>/dev/null; then
              mv "$tmp" "feeds/$slug.xml"
              if head -c 200 "feeds/$slug.xml" | grep -q '<'; then
                echo "  ✓ XML-looking content saved"
              else
                echo "  ⚠️ no XML tags in first 200 bytes — saved anyway, will diagnose"
              fi
            else
              echo "  ✗ rejected (need HTTP 200 + >200 bytes)"
              echo "  first 400 chars of response:"
              head -c 400 "$tmp" 2>/dev/null | sed 's/^/    /' || true
              echo ""
              rm -f "$tmp"
              # Keep any previous good copy of feeds/$slug.xml.
            fi
          done

      - name: Commit & push if changed
        run: |
          git config user.name "feed-bot"
          git config user.email "noreply@ppmma.org"
          git add feeds/
          if git diff --staged --quiet; then
            echo "No feed changes; nothing to commit."
            exit 0
          fi
          git commit -m "feeds: refresh $(date -u +%Y-%m-%dT%H:%MZ)"

          # Retry push up to 3x in case another run pushed while we were
          # working. Pull --rebase keeps our commit on top of any concurrent
          # change without merging.
          for attempt in 1 2 3; do
            if git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt rejected; pulling --rebase and retrying"
            git pull --rebase
          done
          echo "push failed after 3 attempts"
          exit 1
